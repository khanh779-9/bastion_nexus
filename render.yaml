services:
  # Backend API Web Service
  - type: web
    name: bastion-nexus-backend
    env: docker
    dockerfilePath: apps/backend/Dockerfile
    dockerContext: apps/backend
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bastion-nexus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bastion-nexus-redis
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: bastion-nexus-frontend
          property: url
      - key: BACKEND_URL
        sync: false # Tự động thiết lập dựa trên URL của service sau khi khởi tạo
      - key: JWT_SECRET
        generateValue: true # Render tự động sinh key ngẫu nhiên an toàn
      - key: ENCRYPTION_KEY
        generateValue: true # Render tự động sinh key mã hóa ngẫu nhiên
      - key: RUN_MIGRATIONS
        value: "true"

  # Frontend Web Service
  - type: web
    name: bastion-nexus-frontend
    env: docker
    dockerfilePath: apps/frontend/Dockerfile
    dockerContext: apps/frontend
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: VITE_FRONTEND_URL
        sync: false # Sẽ tự động mapping từ URL của frontend
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: bastion-nexus-backend
          property: url

databases:
  - name: bastion-nexus-db
    plan: free

redis:
  - name: bastion-nexus-redis
    plan: free
    ipAllowList: [] # Chỉ cho phép kết nối nội bộ từ backend trên Render (bảo mật tối đa)
