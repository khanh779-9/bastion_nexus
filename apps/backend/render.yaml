services:
  - type: web
    name: bastion-nexus-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bastion-nexus-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: bastion-nexus-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: RUN_MIGRATIONS
        value: "true"

databases:
  - name: bastion-nexus-db
    plan: free

redis:
  - name: bastion-nexus-redis
    plan: free
    ipAllowList: []
